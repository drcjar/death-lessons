{% extends "base.html" %}
{% block title %}Check your email — deathlessons.org{% endblock %}
{% block content %}
<h1 class="serif" style="font-size:1.9rem; margin:0 0 6px;">Check your email</h1>
<p class="lead">We've sent a sign-in link to <strong>{{ email }}</strong>. It expires in 15 minutes
  and can be used once.</p>
<p class="muted">Didn't arrive? Check spam, or <a href="/login">try again</a>.</p>
{% endblock %}
