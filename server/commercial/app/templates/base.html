<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}deathlessons.org{% endblock %}</title>
  <link rel="stylesheet" href="https://deathlessons.org/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="https://deathlessons.org/">death<span>lessons</span>.org</a>
      <nav>
        <a href="/pricing">Pricing</a>
        {% if user %}<a href="/account">Account</a> <a href="/logout">Sign out</a>
        {% else %}<a href="/login">Sign in</a>{% endif %}
      </nav>
    </div>
  </header>
  <main class="wrap" style="padding: 44px 0;">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p><a href="https://deathlessons.org/">← deathlessons.org</a></p>
      <p class="fine">Paid services built on public Prevention of Future Death reports. Source data © Crown copyright.</p>
    </div>
  </footer>
</body>
</html>
